<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cogworks — coming soon</title>
  <meta name="description" content="A browser game where you program robots to automate a machine colony. In development." />
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(1200px 800px at 70% -10%, #1c2b3a 0%, #0b1118 55%, #070a0f 100%);
      color: #e8eef5;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 2rem;
    }
    .card { max-width: 44rem; }
    .badge {
      display: inline-block;
      font-size: 0.75rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #7fd1ff;
      border: 1px solid #1f3a4d;
      background: #0e1a24;
      border-radius: 999px;
      padding: 0.35rem 0.9rem;
      margin-bottom: 1.5rem;
    }
    h1 {
      font-size: clamp(2.5rem, 8vw, 5rem);
      margin: 0 0 0.5rem;
      background: linear-gradient(120deg, #ffd27f, #ff9f7f 40%, #7fd1ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .tagline { font-size: 1.15rem; color: #aebfce; margin: 0 0 2rem; }
    .loop {
      display: inline-flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: center;
      margin-bottom: 2rem;
    }
    .loop span {
      font-family: ui-monospace, "Cascadia Code", "Fira Code", monospace;
      font-size: 0.85rem;
      background: #0e1a24;
      border: 1px solid #1f3a4d;
      border-radius: 6px;
      padding: 0.4rem 0.7rem;
      color: #cfe3f2;
    }
    .loop .arrow { border: none; background: none; color: #587089; }
    .status {
      font-size: 0.9rem;
      color: #6f8298;
      border-top: 1px solid #16222e;
      padding-top: 1.25rem;
    }
    .status code { color: #7fd1ff; }
    a { color: #7fd1ff; }
  </style>
</head>
<body>
  <main class="card">
    <span class="badge">In Development</span>
    <h1>Cogworks</h1>
    <p class="tagline">Mine. Refine. Build robots. Then <strong>program them</strong> to do it all for you.</p>
    <div class="loop">
      <span>collect</span><span class="arrow">→</span>
      <span>refine</span><span class="arrow">→</span>
      <span>build robots</span><span class="arrow">→</span>
      <span>program</span><span class="arrow">→</span>
      <span>automate</span>
    </div>
    <p class="status">
      🤖 Hosting pipeline is live. This placeholder is served by <strong>GitHub Pages</strong>
      and auto-deploys on every push to <code>main</code>. The game replaces it soon.
    </p>
  </main>
</body>
</html>
