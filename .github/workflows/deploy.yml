name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions the GITHUB_TOKEN needs to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer pushes cancel in-progress ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── NO BUILD STEP YET ─────────────────────────────────────────────
      # We currently publish the static ./site folder directly so hosting
      # is validated before any app code exists. When the Vite app is
      # scaffolded, replace the publish path below and add a build, e.g.:
      #
      #   - uses: actions/setup-node@v4
      #     with: { node-version: 22, cache: npm }
      #   - run: npm ci
      #   - run: npm run build            # outputs ./dist
      #   - run: touch dist/.nojekyll
      #
      # ...then change `path: ./site` to `path: ./dist`.
      # ──────────────────────────────────────────────────────────────────

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload static artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
